<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Social Bio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .form-section, .preview-section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #5568d3;
        }

        .bio-card {
            text-align: center;
            margin-bottom: 24px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #ddd;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            object-fit: cover;
        }

        .bio-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .bio-text {
            color: #666;
            font-size: 14px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            padding: 14px;
            background: #f8f9fa;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            transition: transform 0.2s;
        }

        .link-card:hover {
            transform: translateY(-2px);
            background: #e9ecef;
        }

        .link-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-weight: 700;
            color: white;
        }

        .instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .linkedin { background: #0077b5; }
        .spotify { background: #1DB954; }
        .github { background: #333; }
        .default { background: #667eea; }

        .link-title {
            font-weight: 600;
        }

        .delete-btn {
            margin-left: auto;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-section">
            <h2>Build Your Bio Page</h2>
            
            <div class="input-group">
                <label>Your Name</label>
                <input type="text" id="nameInput" placeholder="John Doe">
            </div>

            <div class="input-group">
                <label>Bio</label>
                <textarea id="bioInput" rows="2" placeholder="Developer | Creator | Dreamer"></textarea>
            </div>

            <div class="input-group">
                <label>Avatar URL</label>
                <input type="url" id="avatarInput" placeholder="https://example.com/photo.jpg">
            </div>

            <hr style="margin: 20px 0; border: none; border-top: 1px solid #eee;">

            <h3 style="margin-bottom: 16px;">Add Social Link</h3>
            
            <div class="input-group">
                <label>Platform Name</label>
                <input type="text" id="linkTitle" placeholder="Instagram, LinkedIn, etc.">
            </div>

            <div class="input-group">
                <label>URL</label>
                <input type="url" id="linkUrl" placeholder="https://instagram.com/username">
            </div>

            <button onclick="addLink()">Add Link</button>
            <button onclick="updateProfile()" style="margin-top: 10px; background: #2ecc71;">Update Profile</button>
        </div>

        <div class="preview-section">
            <h2>Live Preview</h2>
            
            <div class="bio-card">
                <div class="avatar" id="previewAvatar">👤</div>
                <div class="bio-name" id="previewName">Your Name</div>
                <div class="bio-text" id="previewBio">Your bio goes here</div>
            </div>

            <div class="links-container" id="linksContainer">
                <!-- Links will appear here -->
            </div>
        </div>
    </div>

    <script>
        let links = [];

        function updateProfile() {
            const name = document.getElementById('nameInput').value;
            const bio = document.getElementById('bioInput').value;
            const avatar = document.getElementById('avatarInput').value;

            document.getElementById('previewName').textContent = name || 'Your Name';
            document.getElementById('previewBio').textContent = bio || 'Your bio goes here';
            
            const avatarEl = document.getElementById('previewAvatar');
            if (avatar) {
                avatarEl.innerHTML = `<img src="${avatar}" alt="Avatar" style="width:100%;height:100%;border-radius:50%;">`;
            } else {
                avatarEl.innerHTML = '👤';
            }
        }

        function addLink() {
            const title = document.getElementById('linkTitle').value.trim();
            const url = document.getElementById('linkUrl').value.trim();

            if (!title || !url) {
                alert('Please enter both title and URL');
                return;
            }

            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                alert('URL must start with http:// or https://');
                return;
            }

            if (links.some(link => link.url === url)) {
                alert('This link already exists');
                return;
            }

            links.push({ title, url });
            renderLinks();
            
            document.getElementById('linkTitle').value = '';
            document.getElementById('linkUrl').value = '';
        }

        function deleteLink(index) {
            links.splice(index, 1);
            renderLinks();
        }

        function getIconClass(title) {
            const t = title.toLowerCase();
            if (t.includes('instagram')) return 'instagram';
            if (t.includes('linkedin')) return 'linkedin';
            if (t.includes('spotify')) return 'spotify';
            if (t.includes('github')) return 'github';
            return 'default';
        }

        function renderLinks() {
            const container = document.getElementById('linksContainer');
            container.innerHTML = '';

            links.forEach((link, index) => {
                const iconClass = getIconClass(link.title);
                const iconText = link.title.charAt(0).toUpperCase();

                const linkEl = document.createElement('a');
                linkEl.href = link.url;
                linkEl.target = '_blank';
                linkEl.className = 'link-card';
                linkEl.innerHTML = `
                    <div class="link-icon ${iconClass}">${iconText}</div>
                    <div class="link-title">${link.title}</div>
                    <button class="delete-btn" onclick="event.preventDefault(); deleteLink(${index})">Delete</button>
                `;
                container.appendChild(linkEl);
            });
        }

        // Init with sample data
        updateProfile();
    </script>
</body>
</html>
